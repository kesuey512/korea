<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>延世韩语背词 - 艾宾浩斯本地版</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --success: #00b894;
            --warning: #fdcb6e;
            --danger: #d63031;
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #2d3436;
            --muted: #636e72;
            --line: #dfe6e9;
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .card {
            background: var(--card);
            width: 100%;
            max-width: 380px;
            padding: 24px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
        }

        .title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
        }

        .status {
            margin-top: 6px;
            margin-bottom: 14px;
            font-size: 13px;
            color: #7f8c8d;
            line-height: 1.6;
        }

        .kr {
            font-size: 42px;
            font-weight: bold;
            margin: 24px 0 14px;
            color: var(--text);
            word-break: break-word;
        }

        .cn {
            font-size: 20px;
            color: var(--muted);
            min-height: 32px;
            margin-bottom: 18px;
            transition: 0.25s;
            opacity: 0;
        }

        .cn.show { opacity: 1; }

        .btn-group { display: flex; flex-direction: column; gap: 10px; }

        button {
            border: none;
            padding: 13px 12px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }

        button:active { transform: scale(0.98); }

        .btn-main { background: var(--primary); color: white; }
        .btn-remember { background: var(--success); color: white; font-weight: bold; }
        .btn-vague { background: var(--warning); color: #2d3436; font-weight: bold; }
        .btn-forget { background: #ffeaea; color: var(--danger); font-weight: bold; }

        .row { display: flex; gap: 10px; }
        .row button { flex: 1; }

        .divider { border: none; border-top: 1px solid var(--line); margin: 4px 0; }
        .badge { background: #dfe6e9; padding: 2px 8px; border-radius: 10px; font-size: 11px; }

        .footer {
            margin-top: 14px;
            font-size: 12px;
            color: #95a5a6;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="title">延世韩语背词</div>
    <div id="unit-info" class="status">正在初始化...</div>

    <div class="kr" id="kr">---</div>
    <div class="cn" id="cn">---</div>

    <div class="btn-group">
        <button class="btn-main" onclick="speak()">🔊 发音</button>
        <button class="btn-main" onclick="showTranslation()">👁 查看翻译</button>

        <hr class="divider">

        <div class="row">
            <button class="btn-remember" onclick="handleResult('known')">✅ 记住</button>
            <button class="btn-vague" onclick="handleResult('vague')">😕 模糊</button>
            <button class="btn-forget" onclick="handleResult('unknown')">❌ 忘记</button>
        </div>
    </div>

    <div class="status" style="margin-top:16px;">
        待复习: <span id="due-count" class="badge">0</span>
    </div>

    <div class="footer">
        规则：记住按曲线推进；模糊后天复习；忘记明天复习。
    </div>
</div>

<script>
    // 1. 艾宾浩斯周期
    const INTERVALS = [0, 1, 2, 4, 7, 15, 30, 60];

    // 2. 单词词库 (直接写在代码里，避免读取外部文件)
    const rawWords = [
        { kr: "안녕하세요", cn: "你好", unit: "U1" },
        { kr: "만나서 반갑습니다", cn: "见到你很高兴", unit: "U1" },
        { kr: "학생", cn: "学生", unit: "U1" },
        { kr: "선생님", cn: "老师", unit: "U1" },
        { kr: "한국", cn: "韩国", unit: "U1" },
        { kr: "중국", cn: "中国", unit: "U1" },
        { kr: "학교", cn: "学校", unit: "U2" },
        { kr: "도서관", cn: "图书馆", unit: "U2" },
        { kr: "식당", cn: "餐厅/食堂", unit: "U2" },
        { kr: "집", cn: "家", unit: "U2" },
        { kr: "책상", cn: "书桌", unit: "U2" },
        { kr: "사과", cn: "苹果", unit: "U3" },
        { kr: "우유", cn: "牛奶", unit: "U3" },
        { kr: "빵", cn: "面包", unit: "U3" },
        { kr: "비싸다", cn: "贵", unit: "U3" },
        { kr: "싸다", cn: "便宜", unit: "U3" },
        { kr: "가다", cn: "去", unit: "U4" },
        { kr: "먹다", cn: "吃", unit: "U4" },
        { kr: "자다", cn: "睡觉", unit: "U4" },
        { kr: "공부하다", cn: "学习", unit: "U4" },
        { kr: "오늘", cn: "今天", unit: "U5" },
        { kr: "내일", cn: "明天", unit: "U5" },
        { kr: "월요일", cn: "周一", unit: "U5" }
    ];

    const STORAGE_KEY = "kr_progress_local_v3";
    let wordProgress = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
    let reviewQueue = [];
    let currentWord = null;

    const nowTs = () => Date.now();
    const daysToMs = (days) => days * 24 * 60 * 60 * 1000;
    const shuffle = (arr) => arr.sort(() => Math.random() - 0.5);

    function getProgress(word) {
        return wordProgress[word.kr] || { stage: 0, nextReview: 0, lastResult: "new" };
    }

    function initApp() {
        const now = nowTs();
        // 筛选逻辑：新词或已到复习时间的词
        reviewQueue = rawWords.filter(word => {
            const data = getProgress(word);
            return !data.nextReview || now >= data.nextReview;
        });

        shuffle(reviewQueue);
        renderNext();
    }

    function renderNext() {
        const krEl = document.getElementById("kr");
        const cnEl = document.getElementById("cn");
        const dueEl = document.getElementById("due-count");
        const infoEl = document.getElementById("unit-info");

        dueEl.innerText = reviewQueue.length;

        if (reviewQueue.length === 0) {
            currentWord = null;
            krEl.innerText = "🎉";
            cnEl.innerText = "任务已完成！";
            cnEl.classList.add("show");
            infoEl.innerHTML = `明天再来复习吧`;
            return;
        }

        currentWord = reviewQueue[0];
        const data = getProgress(currentWord);

        krEl.innerText = currentWord.kr;
        cnEl.innerText = currentWord.cn;
        cnEl.classList.remove("show");

        infoEl.innerHTML = `
            单元：<span class="badge">${currentWord.unit}</span>
            &nbsp; 阶段：<span class="badge">${data.stage}</span>
        `;
    }

    function showTranslation() {
        document.getElementById("cn").classList.add("show");
    }

    function handleResult(result) {
        if (!currentWord) return;
        const now = nowTs();
        let data = getProgress(currentWord);

        if (result === 'known') {
            data.stage = Math.min(data.stage + 1, INTERVALS.length - 1);
            const days = INTERVALS[data.stage];
            data.nextReview = now + daysToMs(days);
        } else if (result === 'vague') {
            // 模糊则2天后复习，阶段不变
            data.nextReview = now + daysToMs(2);
        } else {
            // 忘记则重置，明天复习
            data.stage = 0;
            data.nextReview = now + daysToMs(1);
        }

        wordProgress[currentWord.kr] = data;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(wordProgress));
        
        reviewQueue.shift();
        renderNext();
    }

    function speak() {
        if (!currentWord) return;
        const msg = new SpeechSynthesisUtterance(currentWord.kr);
        msg.lang = "ko-KR";
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(msg);
    }

    initApp();
</script>

</body>
</html>

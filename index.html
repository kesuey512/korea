<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>韩语背词</title>
  <link rel="stylesheet" href="./style.css?v=20260609-hard2" />
</head>
<body>
  <main class="app-shell">
    <section class="panel">
      <header class="topbar">
        <div>
          <h1 class="title">韩语背词</h1>
          <p id="user-status" class="user-status">本机模式</p>
        </div>
        <div class="sync-actions">
          <button id="login-btn" class="btn-ghost" type="button">登录</button>
          <button id="logout-btn" class="btn-ghost" type="button" hidden>退出</button>
          <button id="export-btn" class="btn-ghost" type="button">导出</button>
          <label class="btn-ghost file-btn" for="import-file">导入</label>
          <input id="import-file" type="file" accept="application/json" />
        </div>
      </header>

      <div id="sync-msg" class="sync-msg">正在加载词库...</div>

      <div class="task-tabs" aria-label="学习任务">
        <button id="task-new-btn" class="task-tab active" type="button">学习新词</button>
        <button id="task-due-btn" class="task-tab" type="button">到期复习</button>
        <button id="task-today-btn" class="task-tab" type="button">复习今日新词</button>
        <button id="task-hard-btn" class="task-tab" type="button">顽固词</button>
      </div>

      <div class="content-grid">
        <div class="status-panel">
          <div class="status-box">
            <span class="status-label">待学习</span>
            <strong id="learn-count" class="status-count">0</strong>
          </div>
          <div class="status-box">
            <span class="status-label">待复习</span>
            <strong id="review-count" class="status-count">0</strong>
          </div>
          <div class="status-box">
            <span class="status-label">已掌握</span>
            <strong id="mastered-count" class="status-count">0</strong>
          </div>
          <div class="status-box">
            <span class="status-label">今日新词</span>
            <strong id="today-new-count" class="status-count">0</strong>
          </div>
          <div class="status-box">
            <span class="status-label">顽固词</span>
            <strong id="hard-count" class="status-count">0</strong>
          </div>
        </div>

        <section class="study-area">
          <div class="word-meta">
            <div id="unit-info" class="status">准备中</div>
            <div id="group-info" class="status strong"></div>
            <div id="group-progress" class="status"></div>
          </div>

          <article class="word-card" aria-live="polite">
            <div class="kr" id="kr">---</div>
            <div class="cn" id="cn">---</div>
          </article>

          <div class="btn-group">
            <div class="row">
              <button class="btn-main" id="speak-btn" type="button">发音</button>
              <button class="btn-main" id="show-btn" type="button">查看翻译</button>
            </div>
            <div class="row">
              <button class="btn-remember" id="known-btn" type="button">记住</button>
              <button class="btn-vague" id="vague-btn" type="button">模糊</button>
              <button class="btn-forget" id="unknown-btn" type="button">忘记</button>
            </div>
          </div>
        </section>

        <aside class="control-area">
          <div class="study-controls">
            <label class="control-group" for="study-mode">
              <span>背诵范围</span>
              <select id="study-mode">
                <option value="all">全部乱序</option>
                <option value="unit">按单元背诵</option>
              </select>
            </label>

            <label class="control-group" for="unit-select">
              <span>选择单元</span>
              <select id="unit-select">
                <option value="__all__">全部单元</option>
              </select>
            </label>

            <label class="control-group" for="daily-limit">
              <span>每日新词</span>
              <select id="daily-limit">
                <option value="10">10 个</option>
                <option value="20" selected>20 个</option>
                <option value="30">30 个</option>
                <option value="50">50 个</option>
                <option value="0">不限</option>
              </select>
            </label>

            <label class="control-group search-group" for="search-input">
              <span>词库搜索</span>
              <input id="search-input" type="search" placeholder="韩语 / 中文 / 词性" autocomplete="off" />
            </label>
          </div>

          <div id="search-results" class="search-results" hidden></div>

          <div class="reset-controls">
            <button id="reset-current-btn" class="btn-reset-current" type="button">重置当前范围</button>
            <button id="reset-all-btn" class="btn-reset-all" type="button">重置全部进度</button>
          </div>
        </aside>
      </div>

      <footer class="footer">
        <span>可手动选择学习新词、到期复习或复习今日新词。</span>
        <span>记住后按 1 / 2 / 4 / 7 / 15 / 30 天安排复习。</span>
      </footer>
    </section>
  </main>

  <script type="module" src="./app.js?v=20260609-hard2"></script>
</body>
</html>

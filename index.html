<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>延世韩语背词</title>
    <style>
        :root { --primary: #6c5ce7; --success: #00b894; --warning: #fdcb6e; --danger: #d63031; --bg: #f0f2f5; --card: #ffffff; --text: #2d3436; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 16px; }
        .card { background: var(--card); width: 100%; max-width: 360px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .kr { font-size: 42px; font-weight: bold; margin: 20px 0; color: var(--text); }
        .cn { font-size: 20px; color: #636e72; min-height: 30px; margin-bottom: 20px; opacity: 0; transition: 0.2s; }
        .cn.show { opacity: 1; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        button { border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-size: 16px; }
        .btn-main { background: var(--primary); color: white; }
        .btn-row { display: flex; gap: 8px; }
        .btn-row button { flex: 1; font-weight: bold; color: white; }
    </style>
</head>
<body>

<div class="card">
    <div style="font-size: 12px; color: #95a5a6;" id="info">正在初始化...</div>
    <div class="kr" id="kr">---</div>
    <div class="cn" id="cn">---</div>

    <div class="btn-group">
        <button class="btn-main" onclick="speak()">🔊 发音</button>
        <button class="btn-main" onclick="document.getElementById('cn').classList.add('show')">👁 查看翻译</button>
        <div class="btn-row">
            <button style="background:var(--success)" onclick="handleResult(1)">✅ 记住</button>
            <button style="background:var(--warning); color:#2d3436" onclick="handleResult(0.5)">😕 模糊</button>
            <button style="background:var(--danger)" onclick="handleResult(0)">❌ 忘记</button>
        </div>
    </div>
    <div style="margin-top: 15px; font-size: 12px; color: #b2bec3;">待复习: <span id="due-count">0</span></div>
</div>

<script>
    // 单词库直接放在这里，排除文件加载问题
    const rawWords = [
        { kr: "안녕하세요", cn: "你好", unit: "U1" },
        { kr: "선생님", cn: "老师", unit: "U1" },
        { kr: "학생", cn: "学生", unit: "U1" },
        { kr: "학교", cn: "学校", unit: "U2" },
        { kr: "사과", cn: "苹果", unit: "U3" },
        { kr: "공부하다", cn: "学习", unit: "U4" }
    ];

    const INTERVALS = [0, 1, 2, 4, 7, 15, 30];
    let wordProgress = JSON.parse(localStorage.getItem('kr_v3')) || {};
    let queue = [];
    let current = null;

    function init() {
        const now = Date.now();
        queue = rawWords.filter(w => !wordProgress[w.kr] || now >= wordProgress[w.kr].next);
        queue.sort(() => Math.random() - 0.5);
        render();
    }

    function render() {
        if (queue.length === 0) {
            document.getElementById('kr').innerText = "🎉";
            document.getElementById('cn').innerText = "今日打卡成功！";
            document.getElementById('cn').classList.add('show');
            return;
        }
        current = queue[0];
        document.getElementById('kr').innerText = current.kr;
        document.getElementById('cn').innerText = current.cn;
        document.getElementById('cn').classList.remove('show');
        document.getElementById('due-count').innerText = queue.length;
        document.getElementById('info').innerText = current.unit;
    }

    function handleResult(score) {
        if (!current) return;
        let data = wordProgress[current.kr] || { stage: 0 };
        
        if (score === 1) data.stage = Math.min(data.stage + 1, 6);
        else if (score === 0) data.stage = 0;
        
        const days = INTERVALS[data.stage];
        data.next = Date.now() + (days || 1) * 24 * 60 * 60 * 1000;
        
        wordProgress[current.kr] = data;
        localStorage.setItem('kr_v3', JSON.stringify(wordProgress));
        queue.shift();
        render();
    }

    function speak() {
        const msg = new SpeechSynthesisUtterance(current.kr);
        msg.lang = 'ko-KR';
        window.speechSynthesis.speak(msg);
    }

    init();
</script>
</body>
</html>
